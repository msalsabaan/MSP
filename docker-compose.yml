services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME:-msp}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-msp_password}
      POSTGRES_DB: ${DB_NAME:-msp_db}
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-msp} -d ${DB_NAME:-msp_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./BackEnd
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      API_PREFIX: api
      CORS_ORIGIN: http://localhost
      DB_HOST: db
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME:-msp}
      DB_PASSWORD: ${DB_PASSWORD:-msp_password}
      DB_NAME: ${DB_NAME:-msp_db}
      DB_SYNCHRONIZE: "true"
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-me-too}
      JWT_REFRESH_EXPIRES_IN: 7d
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-admin@msp.sa}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-Admin@12345}
      UPLOAD_DIR: uploads
      MAX_UPLOAD_MB: 5
    volumes:
      - uploads_data:/app/uploads
    ports:
      - "3000:3000"

  # Static Angular site served by nginx, which also reverse-proxies /api -> backend.
  frontend:
    build: ./FrontEnd
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  db_data:
  uploads_data:
